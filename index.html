<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aura Cricket Pro | World Series</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #loading { position: fixed; inset: 0; background: #050505; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; color: #3b82f6; }
        .spinner { width: 50px; height: 50px; border: 3px solid rgba(59, 130, 246, 0.2); border-top-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* High-End Scoreboard */
        .hud { position: absolute; top: 30px; left: 30px; background: rgba(0,0,0,0.85); padding: 20px; border-radius: 0 20px 0 20px; border-left: 5px solid #3b82f6; backdrop-filter: blur(10px); pointer-events: none; }
        .power-bar-container { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); width: 300px; height: 12px; background: rgba(255,255,255,0.1); border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); overflow: hidden; }
        #power-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #3b82f6, #60a5fa, #ffffff); box-shadow: 0 0 20px #3b82f6; }
        
        .flash-msg { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 80px; font-weight: 900; color: white; text-shadow: 0 0 30px #3b82f6; font-style: italic; opacity: 0; transition: 0.2s; pointer-events: none; }
    </style>
</head>
<body>

<div id="loading">
    <div class="spinner"></div>
    <p class="mt-4 tracking-[0.3em] font-bold">LOADING STADIUM...</p>
</div>

<div class="hud">
    <div class="text-blue-400 text-[10px] tracking-widest font-bold">WORLD SERIES PRO</div>
    <div class="text-3xl font-black text-white"><span id="runs">0</span> - <span id="wickets">0</span></div>
    <div class="text-xs text-white/60">OVERS: <span id="overs">0.0</span></div>
</div>

<div class="flash-msg" id="flash">6!</div>

<div class="power-bar-container">
    <div id="power-fill"></div>
</div>

<script>
    let scene, camera, renderer, ball, batsman, bat, pitch, stadium;
    let ballMoving = false, isSwinging = false, power = 0;
    let score = 0, wickets = 0, deliveries = 0;

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0f);
        scene.fog = new THREE.FogExp2(0x0a0a0f, 0.015);

        camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(0, 3.5, 12); // Pro Broadcast Angle
        camera.lookAt(0, 1.5, -5);

        renderer = new THREE.WebGLRenderer({ antialias: true, logarithmicDepthBuffer: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ReinhardToneMapping;
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- Lights (Dynamic Stadium Lighting) ---
        const amb = new THREE.AmbientLight(0x404040, 0.5);
        scene.add(amb);

        const floodLight = new THREE.DirectionalLight(0xffffff, 1.5);
        floodLight.position.set(20, 50, 20);
        floodLight.castShadow = true;
        scene.add(floodLight);

        buildProStadium();
        buildRealisticPlayer();
        createBall();

        document.getElementById('loading').style.display = 'none';
        animate();
        setTimeout(bowl, 1500);
    }

    function buildProStadium() {
        // Ground with Grass Texture simulation
        const groundGeo = new THREE.CircleGeometry(100, 64);
        const groundMat = new THREE.MeshStandardMaterial({ 
            color: 0x143314, 
            roughness: 0.8,
            metalness: 0.1
        });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Realistic Pitch
        const pitchGeo = new THREE.PlaneGeometry(3.5, 22);
        const pitchMat = new THREE.MeshStandardMaterial({ color: 0xd2b48c });
        const pitchMesh = new THREE.Mesh(pitchGeo, pitchMat);
        pitchMesh.rotation.x = -Math.PI / 2;
        pitchMesh.position.y = 0.01;
        scene.add(pitchMesh);

        // Stadium Stands & Crowd Glow
        const standGeo = new THREE.TorusGeometry(90, 15, 16, 100);
        const standMat = new THREE.MeshStandardMaterial({ color: 0x050505 });
        const stands = new THREE.Mesh(standGeo, standMat);
        stands.rotation.x = Math.PI/2;
        stands.position.y = 5;
        scene.add(stands);
        
        // Boundary Rope
        const rope = new THREE.Mesh(
            new THREE.TorusGeometry(60, 0.4, 8, 100),
            new THREE.MeshStandardMaterial({ color: 0xffffff })
        );
        rope.rotation.x = Math.PI/2;
        scene.add(rope);
    }

    function buildRealisticPlayer() {
        batsman = new THREE.Group();
        
        // Creating a detailed articulated figure instead of a box
        const matBlue = new THREE.MeshStandardMaterial({ color: 0x1e40af }); // Team Blue
        const matSkin = new THREE.MeshStandardMaterial({ color: 0xffdbac });
        
        // Torso
        const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.25, 0.9, 8), matBlue);
        torso.position.y = 1.3;
        batsman.add(torso);

        // Legs with Pads
        const legMat = new THREE.MeshStandardMaterial({ color: 0x2563eb });
        const lLeg = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.8, 0.25), legMat);
        lLeg.position.set(-0.15, 0.4, 0);
        batsman.add(lLeg);
        
        const rLeg = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.8, 0.25), legMat);
        rLeg.position.set(0.15, 0.4, 0);
        batsman.add(rLeg);

        // Head & Helmet
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.2, 16, 16), matSkin);
        head.position.y = 2.0;
        const helmet = new THREE.Mesh(new THREE.SphereGeometry(0.22, 16, 16), new THREE.MeshStandardMaterial({color: 0x000033}));
        helmet.position.y = 2.05;
        batsman.add(head);
        batsman.add(helmet);

        // Bat (High Resolution)
        bat = new THREE.Group();
        const blade = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.85, 0.1), new THREE.MeshStandardMaterial({color: 0xc4a484}));
        bat.add(blade);
        const handle = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.5), new THREE.MeshStandardMaterial({color: 0x111111}));
        handle.position.y = 0.65;
        bat.add(handle);

        bat.position.set(0.7, 1.2, 0.5);
        bat.rotation.x = -0.4;
        batsman.add(bat);

        batsman.position.set(0.5, 0, 1.5);
        scene.add(batsman);
    }

    function createBall() {
        ball = new THREE.Mesh(
            new THREE.SphereGeometry(0.06, 32, 32),
            new THREE.MeshStandardMaterial({ color: 0xcc0000, roughness: 0.3 })
        );
        ball.position.set(0, 0.8, -20);
        ball.castShadow = true;
        scene.add(ball);
    }

    function bowl() {
        ball.position.set((Math.random() - 0.5) * 0.5, 1, -20);
        ballMoving = true;
        power = 0;
        document.getElementById('power-fill').style.width = '0%';
    }

    function swing(type) {
        if(isSwinging) return;
        isSwinging = true;
        
        let start = Date.now();
        const duration = 350;

        const animateSwing = () => {
            let elapsed = Date.now() - start;
            let progress = elapsed / duration;

            if (progress < 1) {
                bat.rotation.y = Math.sin(progress * Math.PI) * 2.5;
                bat.position.x = 0.7 - (progress * 1.5);
                
                // Collision
                const dist = ball.position.distanceTo(batsman.position);
                if (dist < 1.6 && ballMoving) hit(type);

                requestAnimationFrame(animateSwing);
            } else {
                bat.rotation.y = 0;
                bat.position.x = 0.7;
                isSwinging = false;
            }
        };
        animateSwing();
    }

    function hit(type) {
        ballMoving = false;
        const timing = 1.0 - Math.abs(ball.position.z - 1.5); // Timing accuracy
        
        let force = (timing * 1.5) + (power / 50);
        let lift = type === 'up' ? 0.6 : 0.15;
        
        const flash = document.getElementById('flash');
        if (timing > 0.85) { flash.innerText = "PERFECT!"; flash.style.opacity = 1; }
        else { flash.innerText = "GOOD"; flash.style.opacity = 1; }
        setTimeout(() => flash.style.opacity = 0, 1000);

        // Ball Trajectory
        let vx = (Math.random() - 0.5) * force;
        let vy = lift * force;
        let vz = -force;

        const runBall = () => {
            ball.position.x += vx;
            ball.position.y += vy;
            ball.position.z += vz;
            vy -= 0.015; // Gravity

            if(ball.position.y < 0.06) {
                ball.position.y = 0.06;
                vy *= -0.3; // Bounce
            }

            const dist = Math.sqrt(ball.position.x**2 + ball.position.z**2);
            if (dist < 65 && Math.abs(vz) > 0.05) {
                requestAnimationFrame(runBall);
            } else {
                processScore(dist, ball.position.y > 1);
            }
        };
        runBall();
    }

    function processScore(d, isAir) {
        let r = 0;
        if (d >= 60) r = isAir ? 6 : 4;
        else if (d > 30) r = 2;
        else r = 1;

        score += r;
        deliveries++;
        document.getElementById('runs').innerText = score;
        document.getElementById('overs').innerText = Math.floor(deliveries/6) + "." + (deliveries%6);
        setTimeout(bowl, 2000);
    }

    // --- Input Management ---
    window.addEventListener('keydown', (e) => {
        if(e.code === 'ArrowUp') swing('up');
        if(e.code === 'ArrowLeft' || e.code === 'ArrowRight') swing('drive');
        if(e.code === 'Space') {
            power = Math.min(power + 5, 100);
            document.getElementById('power-fill').style.width = power + '%';
        }
    });

    function animate() {
        requestAnimationFrame(animate);
        if (ballMoving) {
            ball.position.z += 0.35 + (deliveries * 0.01);
            if (ball.position.z > 5) { // Clean bowled
                ballMoving = false;
                wickets++;
                document.getElementById('wickets').innerText = wickets;
                document.getElementById('flash').innerText = "WICKET!";
                document.getElementById('flash').style.opacity = 1;
                setTimeout(() => { document.getElementById('flash').style.opacity = 0; bowl(); }, 2000);
            }
        }
        renderer.render(scene, camera);
    }

    init();
</script>
</body>
</html>
