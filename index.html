<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>World Cricket Championship | AR Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Montserrat', sans-serif; color: white; }
        canvas { display: block; }
        
        /* UI Overlays */
        .overlay { position: absolute; inset: 0; pointer-events: none; z-index: 10; }
        .pointer-auto { pointer-events: auto; }

        /* Scoreboard */
        #scoreboard {
            top: 20px; left: 20px;
            background: rgba(0,0,0,0.8);
            border-left: 4px solid #3b82f6;
            padding: 10px 20px;
            backdrop-filter: blur(10px);
        }

        /* Power Bar */
        #power-meter {
            position: absolute; bottom: 40px; left: 50%;
            transform: translateX(-50%);
            width: 200px; height: 10px;
            background: rgba(255,255,255,0.2);
            border-radius: 5px; overflow: hidden;
        }
        #power-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #3b82f6, #ef4444); transition: width 0.1s; }

        /* Feedback Text */
        #feedback {
            position: absolute; top: 40%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4rem; font-weight: 900; font-style: italic;
            text-shadow: 0 0 20px rgba(0,0,0,0.5);
            opacity: 0; transition: 0.3s;
        }

        /* Start Screen */
        #start-screen {
            background: radial-gradient(circle, #1e3a8a 0%, #050505 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .btn-premium {
            background: #3b82f6; color: white;
            padding: 15px 40px; border-radius: 50px;
            font-weight: 700; letter-spacing: 2px;
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.4);
            transition: 0.3s;
        }
        .btn-premium:hover { transform: translateY(-3px); background: #2563eb; }
    </style>
</head>
<body>

    <div id="start-screen" class="overlay pointer-auto">
        <h1 class="text-6xl font-black italic mb-2">WORLD CRICKET</h1>
        <p class="text-blue-400 tracking-[0.5em] uppercase text-sm mb-12">Championship Pro</p>
        <button onclick="startGame()" class="btn-premium">START BATTING</button>
        <p class="mt-8 text-[10px] opacity-40">ARROWS TO HIT • SPACE FOR POWER</p>
    </div>

    <div id="game-ui" class="overlay hidden">
        <div id="scoreboard">
            <div class="text-[10px] opacity-60">SCORE</div>
            <div class="text-2xl font-bold"><span id="runs">0</span> - <span id="wickets">0</span></div>
            <div class="text-[10px] mt-1">OVERS: <span id="overs">0.0</span></div>
        </div>

        <div id="feedback">PERFECT!</div>

        <div id="power-meter">
            <div id="power-fill"></div>
        </div>
    </div>

<script>
    // --- Global Variables ---
    let scene, camera, renderer, ball, batsman, bat, pitch, stadium;
    let ballMoving = false;
    let ballSpeed = 0.4;
    let runs = 0, wickets = 0, ballsBowled = 0;
    let isSwinging = false;
    let power = 0;
    let scoreMultiplier = 1;

    // --- Initialization ---
    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 20, 100);

        camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 3, 10);
        camera.lookAt(0, 1.5, -5);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const ambient = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambient);

        const sun = new THREE.DirectionalLight(0xffffff, 1.2);
        sun.position.set(10, 20, 10);
        sun.castShadow = true;
        scene.add(sun);

        createStadium();
        createPlayer();
        createBall();
    }

    function createStadium() {
        // Ground
        const groundGeo = new THREE.CircleGeometry(60, 64);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x1a472a });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Pitch
        const pitchGeo = new THREE.PlaneGeometry(3.5, 22);
        const pitchMat = new THREE.MeshStandardMaterial({ color: 0xd2b48c });
        pitch = new THREE.Mesh(pitchGeo, pitchMat);
        pitch.rotation.x = -Math.PI / 2;
        pitch.position.y = 0.02;
        pitch.receiveShadow = true;
        scene.add(pitch);

        // Boundary Rope
        const ropeGeo = new THREE.TorusGeometry(58, 0.3, 16, 100);
        const ropeMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
        const rope = new THREE.Mesh(ropeGeo, ropeMat);
        rope.rotation.x = Math.PI / 2;
        scene.add(rope);

        // Crowd Stand (Simplified)
        const standGeo = new THREE.CylinderGeometry(65, 70, 15, 64, 1, true);
        const standMat = new THREE.MeshStandardMaterial({ color: 0x333333, side: THREE.DoubleSide });
        const stand = new THREE.Mesh(standGeo, standMat);
        stand.position.y = 7.5;
        scene.add(stand);
    }

    function createPlayer() {
        batsman = new THREE.Group();
        
        // Body (Jersey)
        const bodyGeo = new THREE.CylinderGeometry(0.3, 0.25, 1.2);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0x1e40af }); // Blue Jersey
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.position.y = 1.4;
        batsman.add(body);

        // Helmet
        const headGeo = new THREE.SphereGeometry(0.25, 16, 16);
        const headMat = new THREE.MeshStandardMaterial({ color: 0x1e3a8a });
        const head = new THREE.Mesh(headGeo, headMat);
        head.position.y = 2.2;
        batsman.add(head);

        // Bat
        bat = new THREE.Group();
        const bladeGeo = new THREE.BoxGeometry(0.2, 0.8, 0.08);
        const bladeMat = new THREE.MeshStandardMaterial({ color: 0xc4a484 });
        const blade = new THREE.Mesh(bladeGeo, bladeMat);
        bat.add(blade);
        
        const handleGeo = new THREE.CylinderGeometry(0.03, 0.03, 0.4);
        const handleMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
        handle.position.y = 0.6;
        bat.add(handle);

        bat.position.set(0.6, 1.2, 0.3);
        bat.rotation.x = -0.5;
        batsman.add(bat);

        batsman.position.set(0.5, 0, 1.5);
        scene.add(batsman);
    }

    function createBall() {
        const ballGeo = new THREE.SphereGeometry(0.06, 16, 16);
        const ballMat = new THREE.MeshStandardMaterial({ color: 0xcc0000 });
        ball = new THREE.Mesh(ballGeo, ballMat);
        ball.position.set(0, 0.5, -18);
        ball.castShadow = true;
        scene.add(ball);
    }

    // --- Gameplay Logic ---
    function startGame() {
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('game-ui').classList.remove('hidden');
        setTimeout(bowl, 1000);
    }

    function bowl() {
        ball.position.set((Math.random() - 0.5) * 1, 1, -18);
        ballMoving = true;
        isSwinging = false;
        power = 0;
        document.getElementById('power-fill').style.width = '0%';
    }

    function showFeedback(text) {
        const fb = document.getElementById('feedback');
        fb.innerText = text;
        fb.style.opacity = '1';
        setTimeout(() => fb.style.opacity = '0', 800);
    }

    function playShot(dir) {
        if (isSwinging) return;
        isSwinging = true;

        // Animation
        const startRot = bat.rotation.y;
        const targetRot = dir === 'left' ? Math.PI/2 : (dir === 'right' ? -Math.PI/2 : 0);
        
        // Simple Swing Animation
        let t = 0;
        const swingInterval = setInterval(() => {
            t += 0.15;
            bat.rotation.y = Math.sin(t) * 2;
            
            // Collision Detection
            const dist = ball.position.distanceTo(batsman.position);
            if (dist < 1.5 && ballMoving) {
                hitBall(dir);
            }

            if (t > Math.PI) {
                clearInterval(swingInterval);
                bat.rotation.y = 0;
            }
        }, 20);
    }

    function hitBall(dir) {
        ballMoving = false;
        const timing = Math.abs(ball.position.z - 1.5);
        
        let force = 0.5 + (power / 100);
        let angle = 0;

        if (timing < 0.2) {
            showFeedback("PERFECT!");
            force *= 1.5;
        } else if (timing < 0.5) {
            showFeedback("GOOD");
        } else {
            showFeedback("LATE");
            force *= 0.5;
        }

        if (dir === 'left') angle = -Math.PI/4;
        if (dir === 'right') angle = Math.PI/4;
        if (dir === 'up') { angle = 0; force *= 1.2; }

        // Launch Ball
        const vx = Math.sin(angle) * force;
        const vz = -Math.cos(angle) * force;
        const vy = dir === 'up' ? force * 0.8 : force * 0.2;

        animateBallHit(vx, vy, vz);
    }

    function animateBallHit(vx, vy, vz) {
        let curVx = vx, curVy = vy, curVz = vz;
        const ballHitInterval = setInterval(() => {
            ball.position.x += curVx;
            ball.position.y += curVy;
            ball.position.z += curVz;
            curVy -= 0.01; // Gravity

            if (ball.position.y <= 0.06) {
                ball.position.y = 0.06;
                curVy *= -0.4; // Bounce
                curVx *= 0.98;
                curVz *= 0.98;
            }

            const dist = Math.sqrt(ball.position.x**2 + ball.position.z**2);
            if (dist > 58 || Math.abs(curVx) < 0.01) {
                clearInterval(ballHitInterval);
                calculateRuns(dist);
            }
        }, 20);
    }

    function calculateRuns(dist) {
        let scored = 0;
        if (dist >= 58) {
            scored = ball.position.y > 1 ? 6 : 4;
        } else if (dist > 30) {
            scored = 2;
        } else {
            scored = 1;
        }
        
        runs += scored;
        ballsBowled++;
        updateUI();
        setTimeout(bowl, 2000);
    }

    function updateUI() {
        document.getElementById('runs').innerText = runs;
        document.getElementById('overs').innerText = (Math.floor(ballsBowled/6) + "." + (ballsBowled%6));
    }

    // --- Controls ---
    window.addEventListener('keydown', (e) => {
        if (e.code === 'ArrowLeft') playShot('left');
        if (e.code === 'ArrowRight') playShot('right');
        if (e.code === 'ArrowUp') playShot('up');
        if (e.code === 'ArrowDown') playShot('defend');
        if (e.code === 'Space') {
            power = Math.min(power + 10, 100);
            document.getElementById('power-fill').style.width = power + '%';
        }
    });

    // --- Main Loop ---
    function animate() {
        requestAnimationFrame(animate);
        
        if (ballMoving) {
            ball.position.z += ballSpeed;
            // Simulated bounce
            if (ball.position.z > -10 && ball.position.z < -8) ball.position.y -= 0.02;
            if (ball.position.z >= -8) ball.position.y += 0.01;

            if (ball.position.z > 5) {
                ballMoving = false;
                wickets++;
                updateUI();
                showFeedback("OUT!");
                setTimeout(bowl, 2000);
            }
        }

        renderer.render(scene, camera);
    }

    init();
    animate();

</script>
</body>
</html>
