<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Cricket | Pro Series</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Montserrat', sans-serif; }
        canvas { display: block; }
        
        .game-ui {
            position: absolute; inset: 0;
            pointer-events: none;
            display: flex; flex-direction: column; justify-content: space-between;
            padding: 40px; z-index: 100;
        }

        .swing-btn {
            pointer-events: auto;
            background: linear-gradient(135deg, #ff416c 0%, #ff4b2b 100%);
            color: white; border: none;
            padding: 20px 60px; font-size: 24px; font-weight: 900;
            border-radius: 50px; text-transform: uppercase;
            box-shadow: 0 10px 30px rgba(255, 75, 43, 0.4);
            cursor: pointer; transition: 0.2s;
            margin: 0 auto;
        }
        .swing-btn:active { transform: scale(0.9) translateY(5px); }
        
        #score-panel {
            background: rgba(0,0,0,0.6); backdrop-filter: blur(10px);
            padding: 15px 30px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1);
            color: white; width: fit-content;
        }
    </style>
</head>
<body>

    <div class="game-ui">
        <div id="score-panel">
            <p class="text-[10px] tracking-widest opacity-60">MATCH SCORE</p>
            <h2 class="text-3xl" id="score">RUNS: 0</h2>
        </div>
        
        <button class="swing-btn" id="swingBtn">Swing Bat</button>
    </div>

<script>
    let scene, camera, renderer, ball, bat, pitch;
    let ballSpeed = 0.5;
    let ballMoving = false;
    let runs = 0;

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Sky Blue

        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.8, 5); // Eyes of the player

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // Lighting (Professional Studio Setup)
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const sunLight = new THREE.DirectionalLight(0xffffff, 1);
        sunLight.position.set(5, 10, 5);
        sunLight.castShadow = true;
        scene.add(sunLight);

        // Ground (Grass)
        const grassGeo = new THREE.PlaneGeometry(100, 100);
        const grassMat = new THREE.MeshStandardMaterial({ color: 0x2d5a27 });
        const grass = new THREE.Mesh(grassGeo, grassMat);
        grass.rotation.x = -Math.PI / 2;
        grass.receiveShadow = true;
        scene.add(grass);

        // Pitch
        const pitchGeo = new THREE.PlaneGeometry(3, 20);
        const pitchMat = new THREE.MeshStandardMaterial({ color: 0xffe4b5 });
        pitch = new THREE.Mesh(pitchGeo, pitchMat);
        pitch.rotation.x = -Math.PI / 2;
        pitch.position.y = 0.01;
        pitch.receiveShadow = true;
        scene.add(pitch);

        // Stumps (Wickets)
        const stumpGeo = new THREE.CylinderGeometry(0.05, 0.05, 0.8);
        const stumpMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
        for(let i = -1; i <= 1; i++) {
            const s = new THREE.Mesh(stumpGeo, stumpMat);
            s.position.set(i * 0.15, 0.4, -8);
            s.castShadow = true;
            scene.add(s);
        }

        // --- The Pro Bat ---
        const batGroup = new THREE.Group();
        // Blade
        const bladeGeo = new THREE.BoxGeometry(0.25, 0.9, 0.08);
        const bladeMat = new THREE.MeshStandardMaterial({ color: 0xc4a484 }); // Wood color
        const blade = new THREE.Mesh(bladeGeo, bladeMat);
        batGroup.add(blade);
        // Handle
        const handleGeo = new THREE.CylinderGeometry(0.03, 0.03, 0.5);
        const handleMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
        const handle = new THREE.Mesh(handleGeo, handleMat);
        handle.position.y = 0.65;
        batGroup.add(handle);

        bat = batGroup;
        bat.position.set(0.6, 1, 3.5); // Position in player's hands
        bat.rotation.z = -0.2;
        scene.add(bat);

        // Ball
        const ballGeo = new THREE.SphereGeometry(0.06, 32, 32);
        const ballMat = new THREE.MeshStandardMaterial({ color: 0xcc0000 });
        ball = new THREE.Mesh(ballGeo, ballMat);
        ball.position.set(0, 0.5, -20);
        ball.castShadow = true;
        scene.add(ball);

        animate();
        spawnBall();
    }

    function spawnBall() {
        ball.position.set((Math.random() - 0.5) * 0.5, 0.8, -20);
        ballMoving = true;
        ballSpeed = 0.2 + (runs * 0.01); // Gets harder
    }

    function swingBat() {
        // Animation using simple rotation
        const tl = new THREE.Vector3();
        let startTime = Date.now();
        
        const animateSwing = () => {
            let elapsed = Date.now() - startTime;
            if (elapsed < 300) {
                bat.rotation.y = -Math.PI / 2 * (elapsed / 300);
                bat.position.x = -0.5;
                
                // Collision check
                if (ball.position.z > 3 && ball.position.z < 4) {
                    ballMoving = false;
                    ball.position.z = -20;
                    runs += 4;
                    document.getElementById('score').innerText = `RUNS: ${runs}`;
                    spawnBall();
                }
                requestAnimationFrame(animateSwing);
            } else {
                bat.rotation.y = 0;
                bat.position.x = 0.6;
            }
        };
        animateSwing();
    }

    document.getElementById('swingBtn').addEventListener('mousedown', swingBat);

    function animate() {
        requestAnimationFrame(animate);

        if (ballMoving) {
            ball.position.z += ballSpeed;
            // Gravity/Bounce effect
            if (ball.position.z > -5 && ball.position.z < 0) {
                ball.position.y -= 0.01;
            } else if (ball.position.z >= 0) {
                ball.position.y += 0.01;
            }

            // Reset if missed
            if (ball.position.z > 6) {
                spawnBall();
            }
        }

        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    init();
</script>
</body>
</html>
