<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Virat Inning 3D</title>
<style>
body { margin:0; overflow:hidden; background:#87CEEB;}
#ui{
position:absolute;
top:10px;
left:10px;
color:white;
font-size:24px;
font-family:Arial;
z-index:10;
}
#banner{
position:absolute;
top:40%;
width:100%;
text-align:center;
font-size:70px;
color:white;
display:none;
font-weight:bold;
z-index:10;
}
#btn{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
padding:15px 30px;
font-size:18px;
z-index:10;
}
</style>
</head>

<body>

<div id="ui">Score: 0</div>
<div id="banner"></div>
<button id="btn">HIT</button>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

let scene = new THREE.Scene()
scene.background = new THREE.Color(0x87ceeb)

let camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

let renderer = new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

let light = new THREE.DirectionalLight(0xffffff,1)
light.position.set(5,10,5)
scene.add(light)

scene.add(new THREE.AmbientLight(0x404040))

// ground
let ground = new THREE.Mesh(
new THREE.CircleGeometry(40,64),
new THREE.MeshPhongMaterial({color:0x3cb043})
)
ground.rotation.x = -Math.PI/2
scene.add(ground)

// pitch
let pitch = new THREE.Mesh(
new THREE.BoxGeometry(3,0.1,20),
new THREE.MeshPhongMaterial({color:0xcaa472})
)
pitch.position.y = 0.05
scene.add(pitch)

// player
let player = new THREE.Mesh(
new THREE.BoxGeometry(1,3,1),
new THREE.MeshPhongMaterial({color:0x0033ff})
)
player.position.set(-2,1.5,0)
scene.add(player)

// bat
let bat = new THREE.Mesh(
new THREE.BoxGeometry(0.2,2,0.2),
new THREE.MeshPhongMaterial({color:0x8b4513})
)
bat.position.set(-1.2,2,0)
scene.add(bat)

// ball
let ball = new THREE.Mesh(
new THREE.SphereGeometry(0.25,32,32),
new THREE.MeshPhongMaterial({color:0xff0000})
)
ball.position.set(8,1,0)
scene.add(ball)

// camera
camera.position.set(-8,5,8)
camera.lookAt(0,0,0)

let speed = 0.12
let score = 0
let banner = document.getElementById("banner")

function animate(){
requestAnimationFrame(animate)

ball.position.x -= speed

// bounce
ball.position.y = 1 + Math.sin(Date.now()*0.005)*0.3

if(ball.position.x < -3){
resetBall()
}

renderer.render(scene,camera)
}
animate()

function swing(){

bat.rotation.z = -1

setTimeout(()=>{
bat.rotation.z = 0
},150)

if(ball.position.x < -1.5 && ball.position.x > -2.8){
hit()
}
}

function hit(){

let runs=[1,2,3,4,6]
let r=runs[Math.floor(Math.random()*runs.length)]

score+=r

document.getElementById("ui").innerHTML="Score: "+score

if(r==4) show("FOUR")
if(r==6) show("SIX")

ball.position.x = 6
ball.position.z = (Math.random()*6)-3

speed += 0.01
}

function show(t){
banner.innerHTML=t
banner.style.display="block"

setTimeout(()=>{
banner.style.display="none"
},800)
}

function resetBall(){
ball.position.set(8,1,0)
}

document.getElementById("btn").onclick = swing
document.addEventListener("click",swing)
document.addEventListener("touchstart",swing)

</script>

</body>
</html>
