<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Virat Inning</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(#87CEEB,#1e9e3f);
text-align:center;
overflow:hidden;
}

h1{
color:white;
margin:5px;
}

#game{
width:100%;
max-width:900px;
height:480px;
background:linear-gradient(#6ed36e,#3fa93f);
margin:auto;
position:relative;
overflow:hidden;
border-radius:10px;
}

#pitch{
position:absolute;
bottom:0;
width:100%;
height:130px;
background:#caa472;
}

#player{
position:absolute;
bottom:100px;
left:100px;
font-size:70px;
}

#ball{
position:absolute;
width:18px;
height:18px;
background:red;
border-radius:50%;
top:260px;
right:0;
}

#score{
color:white;
font-size:22px;
}

#banner{
position:absolute;
top:40%;
width:100%;
font-size:60px;
color:white;
font-weight:bold;
display:none;
text-shadow:0 0 10px black;
}

#teams{
margin:5px;
}

button{
padding:8px 18px;
font-size:16px;
border:none;
border-radius:6px;
cursor:pointer;
margin:3px;
}
</style>
</head>

<body>

<h1>🏏 VIRAT INNING</h1>

<div id="teams">
IPL Mode:
<button onclick="selectTeam('RCB')">RCB</button>
<button onclick="selectTeam('IND')">IND</button>
<button onclick="selectTeam('MI')">MI</button>
<button onclick="selectTeam('CSK')">CSK</button>
</div>

<div id="score">Score: 0</div>

<div id="game">

<div id="banner"></div>

<div id="player">🏏</div>

<div id="ball"></div>

<div id="pitch"></div>

</div>

<button onclick="startGame()">START</button>

<script>
let ball = document.getElementById("ball")
let score = document.getElementById("score")
let banner = document.getElementById("banner")
let player = document.getElementById("player")

let x = 850
let speed = 6
let playing = false
let runs = 0
let team = "RCB"

function selectTeam(t){
team=t
alert("Team Selected: "+t)
}

function startGame(){
runs=0
speed=6
playing=true
score.innerHTML="Score: 0 ("+team+")"
moveBall()
}

function moveBall(){
if(!playing) return

x -= speed
ball.style.right=(900-x)+"px"

if(x<=0){
out()
return
}

requestAnimationFrame(moveBall)
}

function swing(){
if(!playing) return

player.style.transform="rotate(-20deg)"

setTimeout(()=>{
player.style.transform="rotate(0deg)"
},150)

if(x<170 && x>100){
hit()
}
}

function hit(){

let runOptions=[1,2,3,4,6]
let run=runOptions[Math.floor(Math.random()*runOptions.length)]

runs+=run

score.innerHTML="Score: "+runs+" ("+team+")"

if(run==4){
showBanner("FOUR!")
}

if(run==6){
showBanner("SIX!")
}

x=850
speed+=0.4
}

function showBanner(text){
banner.innerHTML=text
banner.style.display="block"

setTimeout(()=>{
banner.style.display="none"
},800)
}

function out(){
playing=false
showBanner("OUT!")
setTimeout(()=>{
alert("Final Score: "+runs)
},300)
}

document.addEventListener("click", swing)
document.addEventListener("touchstart", swing)
</script>

</body>
</html>
